  // Copy tuning (the answers themselves live in Supabase, not here)

    doors: [
      { label:"Door One — What kind of gift is it?", prompt:"Is it a thing you can hold? Or something else entirely…" },
      { label:"Door Two — In which month?",          prompt:"When do the suitcases come out?" },

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap');
  :root{--ink:#2b2320;--paper:#f6efe7;--rose:#b76e6a;--gold:#c9a24b;--line:rgba(43,35,32,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#fbf4ec 0%,var(--paper) 55%,#efe4d8 100%);
    color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.55}
  .card{width:100%;max-width:560px;background:rgba(255,255,255,.55);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:20px;padding:44px 34px 38px;position:relative;overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(90,50,40,.35)}
  .card::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(60% 40% at 100% 0%,rgba(232,199,193,.35),transparent 60%),
               radial-gradient(50% 40% at 0% 100%,rgba(201,162,75,.14),transparent 60%)}
  .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--rose);font-weight:500;margin-bottom:14px}
  h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,7vw,40px);line-height:1.05;letter-spacing:-.01em;margin-bottom:16px}
  h1 em{font-style:italic;color:var(--rose)}
  .prompt{font-family:'Fraunces',serif;font-size:20px;font-weight:300;margin:6px 0 20px;color:#4a3d37}
  p.lede{font-size:15.5px;color:#584a43;margin-bottom:24px}
  .progress{display:flex;gap:8px;margin-bottom:28px}
  .pip{flex:1;height:4px;border-radius:4px;background:var(--line);transition:background .5s}
  .pip.done{background:var(--gold)}.pip.active{background:var(--rose)}
  form{display:flex;flex-direction:column;gap:12px}
  label.fld{font-size:12px;letter-spacing:.04em;color:#7a6a62;margin-bottom:-6px}
  input{font-family:'Fraunces',serif;font-size:18px;padding:14px 16px;border:1px solid var(--line);
    border-radius:12px;background:rgba(255,255,255,.7);color:var(--ink);outline:none;width:100%;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--rose);box-shadow:0 0 0 4px rgba(183,110,106,.15)}
  input:disabled{opacity:.55}
  button{font-family:'Inter';font-weight:500;font-size:15px;padding:14px 18px;border:none;cursor:pointer;
    border-radius:12px;background:var(--ink);color:var(--paper);transition:transform .12s,opacity .2s}
  button:hover{transform:translateY(-1px)}button:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .link{background:none;color:var(--rose);font-size:13px;padding:4px;text-decoration:underline;align-self:center}
  .link:hover{transform:none}
  .tries{display:flex;align-items:center;gap:8px;font-size:13px;color:#7a6a62;margin-top:2px}
  .heart{width:14px;height:14px;background:var(--rose);opacity:.25;border-radius:50%;
    -webkit-mask:var(--h) center/contain no-repeat;mask:var(--h) center/contain no-repeat;
    --h:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9.5-8.5C.5 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5.5 4 3.5 7.5C19 16.65 12 21 12 21z"/></svg>')}
  .heart.left{opacity:1}
  .msg{margin-top:20px;font-size:15px;padding:15px 17px;border-radius:12px;display:none;animation:rise .4s ease both}
  .msg.show{display:block}
  .msg.warm{background:rgba(201,162,75,.14);color:#8a6d1e;border:1px solid rgba(201,162,75,.3)}
  .msg.good{background:rgba(183,110,106,.12);color:#8f4b47;border:1px solid rgba(183,110,106,.3)}
  .msg.good .big{font-family:'Fraunces',serif;font-size:20px;display:block;margin-bottom:4px}
  .msg.locked,.msg.err{background:rgba(43,35,32,.06);color:#4a3d37;border:1px solid var(--line)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .foot{margin-top:26px;font-size:12px;color:#9a887f;text-align:center}
  .foot button{background:none;color:#9a887f;font-size:12px;padding:0;text-decoration:underline}
  .foot button:hover{transform:none}
  .hidden{display:none}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow" id="eyebrow">Happy Birthday</div>
    <h1 id="title">A little <em>game</em> for you</h1>
    <div class="progress hidden" id="progress"></div>
    <p class="prompt" id="prompt"></p>
    <p class="lede" id="lede"></p>

    <!-- AUTH -->
    <form id="authForm">
      <label class="fld">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@email.com">
      <label class="fld">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
      <button type="submit" id="authBtn">Log in</button>
      <button type="button" class="link" id="toggleMode">New here? Create an account</button>
    </form>

    <!-- GAME -->
    <form id="gameForm" class="hidden">
      <input type="text" id="guess" autocomplete="off" placeholder="Type your guess…">
      <button type="submit" id="guessBtn">Guess</button>
      <div class="tries" id="tries"></div>
    </form>

    <div class="msg" id="msg"></div>
    <div class="foot hidden" id="foot"><button id="logout">log out</button></div>
  </main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const el = id => document.getElementById(id);
let signupMode = false;

const show = (node,on)=> node.classList.toggle('hidden', !on);
function msg(cls, html){ const m=el('msg'); m.className='msg show '+cls; m.innerHTML=html; }
function clearMsg(){ el('msg').className='msg'; }

// ---------- AUTH ----------
el('toggleMode').addEventListener('click', ()=>{
  signupMode = !signupMode;
  el('authBtn').textContent = signupMode ? 'Create account' : 'Log in';
  el('toggleMode').textContent = signupMode ? 'Have an account? Log in' : 'New here? Create an account';
  el('password').setAttribute('autocomplete', signupMode ? 'new-password':'current-password');
  clearMsg();
});

el('authForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const email=el('email').value.trim(), password=el('password').value;
  if(!email||!password) return;
  el('authBtn').disabled=true;
  try{
    const fn = signupMode ? sb.auth.signUp : sb.auth.signInWithPassword;
    const { error } = await fn.call(sb.auth, { email, password });
    if(error){ msg('err', error.message); return; }
    if(signupMode){
      // If email confirmation is OFF, session is active immediately.
      const { data } = await sb.auth.getSession();
      if(!data.session){ msg('good','Account created. Check your email to confirm, then log in.'); signupMode=false; el('authBtn').textContent='Log in'; return; }
    }
    await enterGame();
  } finally { el('authBtn').disabled=false; }
});

el('logout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

// ---------- GAME ----------
function renderProgress(stage, total, solvedAll){
  const p=el('progress'); p.innerHTML=''; show(p,true);
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='pip'+((i<stage||solvedAll)?' done':(i===stage?' active':''));
    p.appendChild(d);
  }
}
function renderTries(left){
  const t=el('tries'); t.innerHTML='';
  for(let i=0;i<2;i++){ const h=document.createElement('span'); h.className='heart'+(i<left?' left':''); t.appendChild(h); }
  const s=document.createElement('span'); s.textContent = left===1?'1 guess left today':left+' guesses left today'; t.appendChild(s);
}

function paintDoor(stage, triesLeft){
  const d = COPY.doors[stage];
  el('prompt').textContent = d.label;
  el('lede').textContent = (stage===0) ? COPY.intro : d.prompt;
  renderProgress(stage, COPY.doors.length, false);
  renderTries(triesLeft);
  el('guess').disabled = triesLeft<=0;
  el('guessBtn').disabled = triesLeft<=0;
}

function paintFinale(){
  el('eyebrow').textContent='You did it';
  el('title').innerHTML='Every door, <em>open</em>';
  el('prompt').textContent=''; el('lede').textContent='';
  renderProgress(COPY.doors.length, COPY.doors.length, true);
  show(el('gameForm'),false);
  msg('good','<span class="big">'+COPY.finale+'</span>');
}

async function enterGame(){
  show(el('authForm'),false);
  show(el('gameForm'),true);
  show(el('foot'),true);
  el('eyebrow').textContent='Happy Birthday';
  el('title').innerHTML='A little <em>game</em> for you';
  clearMsg();

  const { data, error } = await sb.rpc('get_status');
  if(error){ msg('err','Could not load your game. '+error.message); return; }
  if(data.solved_all){ paintFinale(); return; }
  paintDoor(data.stage, data.tries_left);
  if(data.tries_left<=0){
    msg('locked',"That's both guesses for today. The door stays shut until tomorrow. 🤍");
  }
}

el('gameForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const val=el('guess').value; if(!val.trim()) return;
  el('guessBtn').disabled=true;
  try{
    const { data, error } = await sb.rpc('make_guess', { guess: val });
    if(error){ msg('err', error.message); return; }
    el('guess').value='';

    if(data.state==='correct'){
      renderProgress(data.stage, COPY.doors.length, false);
      msg('good','<span class="big">'+data.message+'</span>');
      const b=document.createElement('button'); b.textContent='Open the next door →';
      b.style.marginTop='16px'; b.style.width='100%';
      b.onclick=()=>{ clearMsg(); paintDoor(data.stage, data.tries_left); };
      el('msg').appendChild(b);
      el('guess').disabled=true; el('guessBtn').disabled=true;
    }
    else if(data.state==='finished'){
      msg('good','<span class="big">'+data.message+'</span>');
      setTimeout(paintFinale, 1500);
    }
    else if(data.state==='wrong'){
      renderTries(data.tries_left);
      msg('warm', data.warm ? 'Warmer… you\'re circling it. One guess left — make it count.'
                            : 'Not quite. One guess left today — take your time.');
    }
    else if(data.state==='locked'){
      renderTries(0);
      el('guess').disabled=true; el('guessBtn').disabled=true;
      msg('locked', (data.warm?'So close — but not quite. ':'Not it. ')+
        "That's both guesses for today. Try again tomorrow. 🤍");
    }
    else if(data.state==='done'){ paintFinale(); }
  } finally { if(!el('guess').disabled) el('guessBtn').disabled=false; }
});

// ---------- boot: resume session if already logged in ----------
(async ()=>{
  const { data } = await sb.auth.getSession();
  if(data.session){ await enterGame(); }
})();
</script>
</body>
</html>
